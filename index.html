    <style>
      /* =====================================================
         AI Workstation — 移动端全面适配补丁
         适用于 Shadcn Admin + TailwindCSS + React 架构
         无需重新编译，覆盖编译后 CSS
         ===================================================== */

      /* === 1. 全局基础修复 === */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      img, video, canvas, svg {
        max-width: 100%;
        height: auto;
      }

      /* === 2. 响应式布局修复 === */
      @media (max-width: 640px) {
        .grid-cols-4 {
          grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
        }
        .grid-cols-3 {
          grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
        }
        .grid-cols-2 {
          grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
        }
        .gap-6 { gap: 0.75rem !important; }
        .gap-4 { gap: 0.5rem !important; }
      }

      @media (min-width: 641px) and (max-width: 1024px) {
        .grid-cols-4 {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
        .grid-cols-3 {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
      }

      /* === 3. 侧边栏移动端适配 === */
      @media (max-width: 768px) {
        [data-sidebar="sidebar"] {
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          height: 100vh !important;
          height: 100dvh !important;
          z-index: 50 !important;
          transform: translateX(-100%);
          transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
          box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
        }

        [data-sidebar="sidebar"][data-state="expanded"] {
          transform: translateX(0) !important;
        }

        [data-sidebar="inset"],
        main,
        .peer-data-\[state\=expanded\]\:ml-\[--sidebar-width\] {
          margin-left: 0 !important;
        }

        [data-sidebar-overlay="true"] {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 49;
          backdrop-filter: blur(2px);
        }
      }

      /* === 4. 触摸目标尺寸修复（iOS/Android 最小 44px） === */
      @media (max-width: 1024px) {
        button,
        [role="button"],
        .btn,
        [class*="Button"] {
          min-height: 44px;
          min-width: 44px;
        }

        nav a,
        [data-sidebar="menu-button"] {
          min-height: 48px;
          display: flex;
          align-items: center;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="search"],
        textarea,
        select {
          min-height: 44px;
          font-size: 16px !important;
        }
      }

      /* === 5. 数据表格横向滚动 === */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      .overflow-x-auto,
      [class*="TableContainer"],
      [class*="table-container"] {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      @media (max-width: 768px) {
        table {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          white-space: nowrap;
        }

        td, th {
          white-space: normal;
          min-width: 80px;
        }
      }

      /* === 6. 聊天界面移动端优化 === */
      @media (max-width: 640px) {
        .max-w-\[80\%\] {
          max-width: 92% !important;
        }

        .chat-input-area,
        [class*="ChatInput"],
        [class*="MessageInput"] {
          position: sticky;
          bottom: 0;
          background: var(--background, #fff);
          padding-bottom: env(safe-area-inset-bottom, 0px);
          z-index: 10;
        }

        .chat-messages,
        [class*="MessageList"] {
          padding-bottom: 120px;
        }
      }

      /* === 7. 代码块移动端优化 === */
      .max-w-\[80\%\] pre {
        overflow-x: auto;
        max-width: 100%;
        border-radius: 6px;
        padding: 12px;
        margin: 8px 0;
        font-size: 13px;
        line-height: 1.5;
        -webkit-overflow-scrolling: touch;
        will-change: scroll-position;
      }

      .max-w-\[80\%\] {
        max-width: 80%;
        min-width: 0;
        overflow-wrap: break-word;
        word-break: break-word;
      }

      .max-w-\[80\%\] p,
      .max-w-\[80\%\] li,
      .max-w-\[80\%\] h1,
      .max-w-\[80\%\] h2,
      .max-w-\[80\%\] h3,
      .max-w-\[80\%\] h4,
      .max-w-\[80\%\] h5,
      .max-w-\[80\%\] h6,
      .max-w-\[80\%\] blockquote {
        overflow-wrap: break-word;
        word-break: break-word;
        max-width: 100%;
      }

      .max-w-\[80\%\] code {
        word-break: break-all;
        font-size: 0.875em;
      }

      .max-w-\[80\%\] table {
        display: block;
        overflow-x: auto;
        max-width: 100%;
        border-collapse: collapse;
        margin: 8px 0;
        -webkit-overflow-scrolling: touch;
      }

      .max-w-\[80\%\] img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }

      .max-w-\[80\%\] a {
        word-break: break-all;
      }

      .max-w-\[80\%\] ul,
      .max-w-\[80\%\] ol {
        padding-left: 1.5em;
        margin: 4px 0;
      }

      .max-w-\[80\%\] p {
        margin: 4px 0;
        line-height: 1.6;
      }

      .max-w-\[80\%\] strong {
        font-weight: 600;
      }

      .flex-1.p-4 {
        overflow: hidden;
      }

      .space-y-4 {
        max-width: 100%;
        overflow: hidden;
      }

      .space-y-4 > div {
        max-width: 100%;
      }

      /* === 8. 间距和字体移动端收窄 === */
      @media (max-width: 640px) {
        .p-8 { padding: 1rem !important; }
        .p-6 { padding: 0.75rem !important; }
        .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
        .px-6 { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }

        h1, .text-3xl { font-size: 1.5rem !important; line-height: 1.3 !important; }
        h2, .text-2xl { font-size: 1.25rem !important; line-height: 1.3 !important; }
        h3, .text-xl { font-size: 1.1rem !important; }
      }

      /* === 9. iPhone 安全区适配 === */
      body {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      .fixed.bottom-0,
      [class*="fixed"][class*="bottom"] {
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 0.5rem);
      }

      /* === 10. 模态框移动端适配 === */
      @media (max-width: 640px) {
        [role="dialog"],
        [class*="DialogContent"],
        [class*="SheetContent"] {
          max-height: 90vh !important;
          max-height: 90dvh !important;
          overflow-y: auto !important;
          margin: 0 !important;
          border-radius: 1rem 1rem 0 0 !important;
          position: fixed !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
        }
      }

      /* === 11. 移动端顶部 Header 显示菜单按钮 === */
      @media (max-width: 768px) {
        [data-sidebar-trigger],
        [aria-label*="sidebar"],
        [aria-label*="menu"],
        .sidebar-trigger {
          display: flex !important;
          align-items: center;
          justify-content: center;
        }
      }

      /* === 12. 卡片组件移动端优化 === */
      @media (max-width: 640px) {
        .card,
        [class*="Card"] {
          border-radius: 0.75rem;
        }

        [class*="CardContent"],
        [class*="CardHeader"] {
          padding: 0.75rem !important;
        }
      }

      /* === 13. 防止横向滚动 === */
      #root {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
      }

      .flex {
        min-width: 0;
      }

      /* === 14. 工作流画布移动端提示 === */
      @media (max-width: 768px) {
        [class*="WorkflowCanvas"],
        [class*="workflow-canvas"],
        .workflow-editor {
          position: relative;
        }

        [class*="WorkflowCanvas"]::before,
        [class*="workflow-canvas"]::before {
          content: "💡 建议横屏或使用桌面端查看工作流编辑器";
          display: block;
          background: rgba(59, 130, 246, 0.1);
          border: 1px solid rgba(59, 130, 246, 0.3);
          border-radius: 8px;
          padding: 8px 12px;
          font-size: 13px;
          color: rgb(59, 130, 246);
          margin-bottom: 8px;
          text-align: center;
        }
      }

      /* === 15. 暗色模式移动端兼容 === */
      @media (prefers-color-scheme: dark) {
        .chat-input-area,
        [class*="ChatInput"] {
          background: var(--background, #0f172a);
        }
      }
    </style>

  <body>

    <script>
      /* 移动端软键盘弹出时，防止页面变形 */
      if ('visualViewport' in window) {
        var vv = window.visualViewport;
        function onVVResize() {
          var offsetBottom = window.innerHeight - vv.height - vv.offsetTop;
          document.documentElement.style.setProperty('--keyboard-height', offsetBottom + 'px');
        }
        vv.addEventListener('resize', onVVResize);
        vv.addEventListener('scroll', onVVResize);
      }

      /* 移动端检测 */
      var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
        || window.innerWidth <= 768;
      document.documentElement.setAttribute('data-mobile', isMobile ? 'true' : 'false');

      /* PWA 全屏模式检测 */
      if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
        document.documentElement.setAttribute('data-pwa', 'true');
      }
    </script>
