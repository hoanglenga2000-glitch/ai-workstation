      .max-w-\[80\%\] {

        min-width: 0;           /* flex 子元素收缩 */

        padding: 12px;
        margin: 8px 0;

      }

      .max-w-\[80\%\] code {

        font-size: 0.875em;

        display: block;
        overflow-x: auto;
